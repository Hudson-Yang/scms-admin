spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:scms-test-db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.hong.scms.admin

logging:
  level:
    "[org.springframework]": INFO
    "[org.mybatis]": DEBUG